<!doctype html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEE Digital Monitoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body, #app-wrapper {
            height: 100%;
            width: 100%;
        }
        
        #app-wrapper {
            overflow-y: auto;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            transition: background 0.3s ease;
        }
        
        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .theme-toggle:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }
        
        .theme-toggle:active {
            transform: translateY(-2px) scale(1.02);
        }
        
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-primary: #667eea;
            --accent-secondary: #764ba2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
        }
        
        [data-theme="dark"] {
            --bg-primary: #1e293b;
            --bg-secondary: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-primary: #818cf8;
            --accent-secondary: #a78bfa;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --border: #334155;
            --gradient-start: #4c1d95;
            --gradient-end: #1e1b4b;
        }
        
        .container-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .card {
            background: var(--bg-primary);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .card-header {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        
        .card-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-header-right {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-primary);
            background: rgba(102, 125, 234, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 125, 234, 0.3);
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2525;
        }
        
        .input-field {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(102, 125, 234, 0.1);
        }
        
        .input-field:read-only {
            background: var(--bg-secondary);
            cursor: not-allowed;
        }
        
        .label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .scorecard {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid var(--border);
            text-align: center;
        }
        
        .scorecard-value {
            font-size: 36px;
            font-weight: 900;
            margin: 8px 0;
        }
        
        .scorecard-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .scorecard.good .scorecard-value {
            color: var(--success);
        }
        
        .scorecard.bad .scorecard-value {
            color: var(--danger);
        }
        
        .nav-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: white;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .nav-tab {
            padding: 14px 28px;
            background: linear-gradient(135deg, rgba(102, 125, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 2px solid transparent;
            border-radius: 12px;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            font-size: 15px;
        }
        
        .nav-tab:hover {
            background: linear-gradient(135deg, rgba(102, 125, 234, 0.2), rgba(118, 75, 162, 0.2));
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 125, 234, 0.3);
        }
        
        .nav-tab.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border-color: var(--accent-primary);
            box-shadow: 0 6px 20px rgba(102, 125, 234, 0.4);
            transform: translateY(-2px);
        }
        
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -24px;
            padding: 0 24px;
            width: calc(100% + 48px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        
        th {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 300px;
            min-width: 80px;
        }
        
        tr:hover {
            background: var(--bg-secondary);
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 10000;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        
        .toast.success {
            background: var(--success);
        }
        
        .toast.error {
            background: var(--danger);
        }
        
        .toast.info {
            background: var(--accent-primary);
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .spinner {
            border: 3px solid rgba(102, 125, 234, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 16px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .checkbox-item.active {
            background: rgba(102, 125, 234, 0.1);
            border-color: var(--accent-primary);
        }
        
        .checkbox-item.exceed {
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--warning);
        }
        
        .filter-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 16px;
        }
        
        .chart-container-horizontal {
            position: relative;
            height: 400px;
            margin-top: 16px;
            padding-right: 60px;
        }
        
        .status-good {
            color: var(--success);
            font-weight: 600;
        }
        
        .status-bad {
            color: var(--danger);
            font-weight: 600;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }
        
        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }
        
        .badge-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .target-box {
            background: linear-gradient(135deg, rgba(102, 125, 234, 0.15), rgba(118, 75, 162, 0.15));
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 2px solid var(--accent-primary);
            box-shadow: 0 4px 12px rgba(102, 125, 234, 0.2);
        }
        
        .odt-exceed-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning);
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 12px;
            color: var(--warning);
            font-weight: 600;
        }
        
        .wrap-text {
            white-space: normal !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
            overflow-wrap: break-word !important;
            max-width: 200px;
            min-width: 100px;
        }
        
        .nowrap {
            white-space: nowrap;
        }
        
        .ellipsis {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .notes-cell {
            max-width: 250px !important;
            min-width: 150px !important;
            white-space: normal !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
        }
        
        .odt-actual-time {
            width: 90px !important;
            padding: 4px 6px !important;
            font-size: 12px !important;
            text-align: center !important;
        }
        
        .disabled-for-zero-target {
            background-color: rgba(239, 239, 239, 0.3) !important;
            color: var(--text-secondary) !important;
            cursor: not-allowed !important;
        }

        @media (max-width: 768px) {
            .container-main {
                padding: 16px;
            }
            .nav-tabs {
                padding: 12px;
            }
            .nav-tab {
                padding: 10px 16px;
                font-size: 13px;
            }
            .chart-container-horizontal {
                padding-right: 40px;
            }
        }

        .clickable-row {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .clickable-row:hover {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)) !important;
            color: white;
        }
        
        .clickable-row:hover td {
            color: white;
        }
        
        .clickable-row:hover .status-good,
        .clickable-row:hover .status-bad {
            color: white;
        }
        
        .active-filter-row {
            background: linear-gradient(135deg, rgba(102, 125, 234, 0.2), rgba(118, 75, 162, 0.2)) !important;
            border-left: 4px solid var(--accent-primary);
        }
        
        .exceed-warning {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            color: var(--danger);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .target-info {
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 10px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .target-info strong {
            color: var(--success);
            margin-right: 4px;
        }
        
        .edit-highlight {
            border: 2px solid var(--warning);
            transition: all 0.2s ease;
        }
        
        .edit-preview-card {
            background: rgba(245, 158, 11, 0.05);
            border-left: 4px solid var(--warning);
        }
    </style>
</head>
<body class="h-full">
    <div id="app-wrapper" class="h-full w-full"></div>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle-btn" aria-label="Toggle dark mode"> 🌙 </button>

    <script>
        const SUPABASE_URL = 'https://ehespstzpubqkovkykby.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoZXNwc3R6cHVicWtvdmt5a2J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU1MDY4MjUsImV4cCI6MjA4MTA4MjgyNX0.XTuuHksJVe8ZEwcN5gshXNz7WqEWVPr10eIsYO-zar4';
        
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function initializeTheme() {
            const savedTheme = localStorage.getItem('oee-theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('oee-theme', newTheme);
            updateThemeIcon(newTheme);
            
            showToast(`${newTheme === 'dark' ? '🌙 Dark' : '☀️ Light'} mode activated`, 'success');
        }
        
        function updateThemeIcon(theme) {
            const btn = document.getElementById('theme-toggle-btn');
            if (btn) {
                btn.textContent = theme === 'dark' ? '☀️' : '🌙';
            }
        }

        const defaultConfig = {
            system_title: "OEE Digital Monitoring System PT. GOF",
            company_name: "Created by MSTD GOF"
        };

        let currentPage = 'dashboard';
        let allMachines = [];
        let allOEERecords = [];
        let isManagementUnlocked = false;
        let chartInstances = {};
        
        const MANAGEMENT_PASSWORD = 'admin123';
        
        const SHIFTS = {
            'Shift 1': { start: '07:00', end: '15:30', minutes: 510 },
            'Shift 2': { start: '15:20', end: '22:50', minutes: 450 },
            'Shift 3': { start: '22:40', end: '07:10', minutes: 530 },
            'Longshift Pagi': { start: '07:00', end: '19:00', minutes: 720 },
            'Longshift Malam': { start: '19:00', end: '07:00', minutes: 720 }
        };

        function getCurrentMonthStart() {
            const date = new Date();
            date.setDate(1);
            return date.toISOString().split('T')[0];
        }
        
        function getCurrentMonthEnd() {
            const date = new Date();
            date.setMonth(date.getMonth() + 1);
            date.setDate(0);
            return date.toISOString().split('T')[0];
        }

        let filters = {
            startDate: getCurrentMonthStart(),
            endDate: getCurrentMonthEnd(),
            shift: 'all',
            machine: 'all',
            pic: 'all',
            detailLineStopItem: 'all',
            detailLineStopType: 'all'
        };

        // Variable untuk menyimpan filter dari OEE history yang diklik
        let clickedRecordFilter = null;

        // Variable untuk Edit OEE Admin Mode
        let editingRecordId = null;
        let editingMachineDetails = null;
        let editingRecordData = null;
        let customLSMCounter = 0;
        let customLSNMCounter = 0;
        let customMSCounter = 0;

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function showLoading(message = 'Loading...') {
            const overlay = document.createElement('div');
            overlay.id = 'loading-overlay';
            overlay.className = 'loading-overlay';
            overlay.innerHTML = `
                <div class="spinner"></div>
                <p style="color: white; font-weight: 600; font-size: 16px;">${message}</p>
            `;
            document.body.appendChild(overlay);
        }

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.remove();
        }

        function showModal(content) {
            const modal = document.createElement('div');
            modal.id = 'modal';
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal-content">${content}</div>`;
            modal.onclick = (e) => {
                if (e.target === modal) closeModal();
            };
            document.body.appendChild(modal);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            if (modal) modal.remove();
            editingRecordId = null;
            editingMachineDetails = null;
            editingRecordData = null;
        }

        async function loadMachines() {
            try {
                const { data, error } = await db
                    .from('machines')
                    .select('*')
                    .eq('is_deleted', false)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                allMachines = data || [];
                return allMachines;
            } catch (error) {
                console.error('Error loading machines:', error);
                showToast('Failed to load machines', 'error');
                return [];
            }
        }

        async function loadMachineDetails(machineId) {
            try {
                const [odtRes, lsmRes, lsnmRes, msRes] = await Promise.all([
                    db.from('machine_odt').select('*').eq('machine_id', machineId),
                    db.from('machine_line_stop_mesin').select('*').eq('machine_id', machineId),
                    db.from('machine_line_stop_non_mesin').select('*').eq('machine_id', machineId),
                    db.from('machine_minor_stop').select('*').eq('machine_id', machineId)
                ]);
                
                return {
                    odt: odtRes.data || [],
                    lineStopMesin: lsmRes.data || [],
                    lineStopNonMesin: lsnmRes.data || [],
                    minorStop: msRes.data || []
                };
            } catch (error) {
                console.error('Error loading machine details:', error);
                return { odt: [], lineStopMesin: [], lineStopNonMesin: [], minorStop: [] };
            }
        }

        async function loadOEERecords() {
            try {
                const { data, error } = await db
                    .from('oee_records')
                    .select('*')
                    .order('date', { ascending: false })
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                allOEERecords = data || [];
                return allOEERecords;
            } catch (error) {
                console.error('Error loading OEE records:', error);
                showToast('Failed to load OEE records', 'error');
                return [];
            }
        }

        async function saveMachine(machineData, odtItems, lineStopMesinItems, lineStopNonMesinItems, minorStopItems) {
            try {
                const { data: machine, error: machineError } = await db
                    .from('machines')
                    .insert([machineData])
                    .select()
                    .single();
                
                if (machineError) throw machineError;
                
                const machineId = machine.id;
                
                if (odtItems.length > 0) {
                    const odtData = odtItems.map(item => ({
                        machine_id: machineId,
                        odt_name: item.name,
                        standard_time: item.time
                    }));
                    await db.from('machine_odt').insert(odtData);
                }
                
                if (lineStopMesinItems.length > 0) {
                    const lsmData = lineStopMesinItems.map(item => ({
                        machine_id: machineId,
                        item_name: item
                    }));

        function calculateOEE(formData) {
            const shiftMinutes = SHIFTS[formData.shift]?.minutes || 0;
            const targetPerMinute = formData.targetPerMinute || 0;
            
            if (!shiftMinutes) {
                return {
                    availabilityActual: 0,
                    availability365: 0,
                    performance: 0,
                    quality: 0,
                    oeeActual: 0,
                    oee365: 0,
                    totalODT: 0,
                    totalLineStopMesin: 0,
                    totalLineStopNonMesin: 0,
                    odtExceeds: [],
                    remainingTime: 0,
                    shiftMinutes: 0
                };
            }
            
            let totalODT = 0;
            let odtExceeds = [];
            
            if (formData.odtData) {
                formData.odtData.forEach(odt => {
                    if (odt.checked) {
                        const actualTime = parseFloat(odt.actualTime || 0);
                        const standardTime = parseFloat(odt.standardTime || 0);
                        
                        if (actualTime <= standardTime) {
                            totalODT += actualTime;
                        } else {
                            totalODT += standardTime;
                            const exceed = actualTime - standardTime;
                            odtExceeds.push({
                                item: `ODT Exceed - ${odt.name}`,
                                duration: exceed,
                                action: 'Auto-generated from ODT exceed'
                            });
                        }
                    }
                });
            }
            
            let totalLineStopMesin = 0;
            if (formData.lineStopMesinData) {
                formData.lineStopMesinData.forEach(ls => {
                    totalLineStopMesin += parseFloat(ls.duration || 0);
                });
            }
            
            let totalLineStopNonMesin = 0;
            if (formData.lineStopNonMesinData) {
                formData.lineStopNonMesinData.forEach(ls => {
                    totalLineStopNonMesin += parseFloat(ls.duration || 0);
                });
            }
            
            // Tambahkan ODT exceed ke total line stop non mesin untuk perhitungan
            odtExceeds.forEach(exceed => {
                totalLineStopNonMesin += exceed.duration;
            });
            
            const availabilityActual = shiftMinutes - totalODT > 0 
                ? ((shiftMinutes - totalODT - (totalLineStopMesin + totalLineStopNonMesin)) / (shiftMinutes - totalODT)) * 100 
                : 0;
            
            const availability365 = shiftMinutes > 0 
                ? ((shiftMinutes - totalODT - (totalLineStopMesin + totalLineStopNonMesin)) / shiftMinutes) * 100 
                : 0;
            
            let performance = 100;
            if (targetPerMinute > 0) {
                const availableTimeActual = shiftMinutes - totalODT - totalLineStopMesin - totalLineStopNonMesin;
                const idealOutput = availableTimeActual * targetPerMinute;
                if (idealOutput > 0) {
                    performance = (formData.actualOutput / idealOutput) * 100;
                } else {
                    performance = 0;
                }
            }
            
            let quality = 100;
            if (targetPerMinute > 0) {
                quality = formData.actualOutput > 0 
                    ? ((formData.actualOutput - formData.reject) / formData.actualOutput) * 100 
                    : 0;
            }
            
            const oeeActual = (availabilityActual * performance * quality) / 10000;
            const oee365 = (availability365 * performance * quality) / 10000;
            
            return {
                availabilityActual: Math.max(0, Math.min(100, availabilityActual || 0)),
                availability365: Math.max(0, Math.min(100, availability365 || 0)),
                performance: Math.max(0, Math.min(100, performance || 0)),
                quality: Math.max(0, Math.min(100, quality || 0)),
                oeeActual: Math.max(0, Math.min(100, oeeActual || 0)),
                oee365: Math.max(0, Math.min(100, oee365 || 0)),
                totalODT,
                totalLineStopMesin,
                totalLineStopNonMesin,
                odtExceeds,
                remainingTime: shiftMinutes - totalODT - totalLineStopMesin - totalLineStopNonMesin,
                shiftMinutes
            };
        }

        // Fungsi untuk menghitung total durasi kegiatan (ODT + Line Stop Mesin + Line Stop Non Mesin)
        function calculateTotalDuration(formData) {
            const shiftMinutes = SHIFTS[formData.shift]?.minutes || 0;
            
            let totalODT = 0;
            if (formData.odtData) {
                formData.odtData.forEach(odt => {
                    if (odt.checked) {
                        const actualTime = parseFloat(odt.actualTime || 0);
                        const standardTime = parseFloat(odt.standardTime || 0);
                        totalODT += Math.min(actualTime, standardTime);
                    }
                });
            }
            
            let totalLineStopMesin = 0;
            if (formData.lineStopMesinData) {
                formData.lineStopMesinData.forEach(ls => {
                    totalLineStopMesin += parseFloat(ls.duration || 0);
                });
            }
            
            let totalLineStopNonMesin = 0;
            if (formData.lineStopNonMesinData) {
                formData.lineStopNonMesinData.forEach(ls => {
                    totalLineStopNonMesin += parseFloat(ls.duration || 0);
                });
            }
            
            if (formData.odtData) {
                formData.odtData.forEach(odt => {
                    if (odt.checked) {
                        const actualTime = parseFloat(odt.actualTime || 0);
                        const standardTime = parseFloat(odt.standardTime || 0);
                        if (actualTime > standardTime) {
                            totalLineStopNonMesin += (actualTime - standardTime);
                        }
                    }
                });
            }
            
            return totalODT + totalLineStopMesin + totalLineStopNonMesin;
        }

        function calculateODTTotal(records) {
            let total = 0;
            records.forEach(r => {
                try {
                    if (r.odt_data) {
                        const odtData = typeof r.odt_data === 'string' ? JSON.parse(r.odt_data) : r.odt_data;
                        odtData.forEach(odt => {
                            if (odt.checked) {
                                const actualTime = parseFloat(odt.actualTime || 0);
                                const standardTime = parseFloat(odt.standardTime || 0);
                                total += Math.min(actualTime, standardTime);
                            }
                        });
                    }
                } catch (e) {
                    console.error('Error calculating ODT total:', e);
                }
            });
            return total;
        }

        function calculateLineStopMesinTotal(records) {
            let total = 0;
            records.forEach(r => {
                try {
                    if (r.line_stop_mesin_data) {
                        const lsData = typeof r.line_stop_mesin_data === 'string' ? JSON.parse(r.line_stop_mesin_data) : r.line_stop_mesin_data;
                        lsData.forEach(ls => {
                            total += parseFloat(ls.duration || 0);
                        });
                    }
                } catch (e) {
                    console.error('Error calculating LSM total:', e);
                }
            });
            return total;
        }

        function generateOperatorPerformance(records) {
            const picStats = {};
            
            records.forEach(r => {
                if (!r.pic) return;
                
                if (!picStats[r.pic]) {
                    picStats[r.pic] = {
                        totalOEE: 0,
                        totalOutput: 0,
                        totalTargetOutput: 0,
                        count: 0
                    };
                }
                picStats[r.pic].totalOEE += r.oee_actual || 0;
                picStats[r.pic].totalOutput += r.actual_output || 0;
                
                const shiftMinutes = SHIFTS[r.shift]?.minutes || 0;
                const machine = allMachines.find(m => m.id === r.machine_id);
                const targetPerMinute = machine?.target_per_minute || 0;
                
                let totalODT = 0;
                try {
                    const odtData = typeof r.odt_data === 'string' ? JSON.parse(r.odt_data) : (r.odt_data || []);
                    odtData.forEach(odt => {
                        if (odt.checked) {
                            const actualTime = parseFloat(odt.actualTime || 0);
                            const standardTime = parseFloat(odt.standardTime || 0);
                            totalODT += Math.min(actualTime, standardTime);
                        }
                    });
                } catch (e) {
                    console.error('Error parsing ODT data:', e);
                }
                
                let totalLSM = 0;
                try {
                    const lsmData = typeof r.line_stop_mesin_data === 'string' ? JSON.parse(r.line_stop_mesin_data) : (r.line_stop_mesin_data || []);
                    lsmData.forEach(ls => {
                        totalLSM += parseFloat(ls.duration || 0);
                    });
                } catch (e) {
                    console.error('Error parsing LSM data:', e);
                }
                
                let totalLSNM = 0;
                try {
                    const lsnmData = typeof r.line_stop_non_mesin_data === 'string' ? JSON.parse(r.line_stop_non_mesin_data) : (r.line_stop_non_mesin_data || []);
                    lsnmData.forEach(ls => {
                        totalLSNM += parseFloat(ls.duration || 0);
                    });
                } catch (e) {
                    console.error('Error parsing LSNM data:', e);
                }
                
                const availableTime = shiftMinutes - totalODT - totalLSM - totalLSNM;
                const targetOutput = targetPerMinute > 0 ? availableTime * targetPerMinute : 0;
                
                picStats[r.pic].totalTargetOutput += targetOutput;
                picStats[r.pic].count += 1;
            });
            
            const sorted = Object.entries(picStats)
                .map(([pic, stats]) => ({
                    pic,
                    avgOEE: stats.totalOEE / stats.count,
                    totalOutput: stats.totalOutput,
                    totalTargetOutput: stats.totalTargetOutput,
                    count: stats.count
                }))
                .filter(s => s.totalOutput > 0 || s.totalTargetOutput > 0)
                .sort((a, b) => b.avgOEE - a.avgOEE);
            
            if (sorted.length === 0) {
                return '<tr><td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 40px;">Tidak ada operator dengan data output</td></tr>';
            }
            
            return sorted.map(s => `
                <tr>
                    <td class="wrap-text"><strong>${s.pic}</strong></td>
                    <td class="${s.avgOEE >= 88 ? 'status-good' : 'status-bad'} wrap-text">${s.avgOEE.toFixed(1)}%</td>
                    <td class="wrap-text">${s.totalOutput.toLocaleString('id-ID')}</td>
                    <td class="wrap-text">${Math.round(s.totalTargetOutput).toLocaleString('id-ID')}</td>
                    <td class="wrap-text">${s.count}</td>
                </tr>
            `).join('');
        }

        function generateLineStopMesinRows(records) {
            const rows = [];
            const seen = new Set(); // Untuk mencegah duplikasi
            
            records.forEach(r => {
                try {
                    if (r.line_stop_mesin_data) {
                        const lsData = typeof r.line_stop_mesin_data === 'string' ? JSON.parse(r.line_stop_mesin_data) : r.line_stop_mesin_data;
                        
                        lsData.forEach(ls => {
                            if (ls.duration && parseFloat(ls.duration) > 0) {
                                // Buat unique key untuk mencegah duplikasi
                                const key = `${r.id}-${ls.item}-${ls.duration}-${ls.action || ''}`;
                                if (!seen.has(key)) {
                                    seen.add(key);
                                    rows.push({
                                        id: r.id,
                                        date: r.date ? new Date(r.date).toLocaleDateString('id-ID') : '-',
                                        shift: r.shift || '-',
                                        machine: r.machine_name || '-',
                                        pic: r.pic || '-',
                                        batch: r.batch_number || '-',
                                        lineStop: ls.item || '-',
                                        action: ls.action || '-',
                                        durasi: parseFloat(ls.duration || 0).toFixed(1),
                                        wr: ls.wr || '-'
                                    });
                                }
                            }
                        });
                    }
                } catch (e) {
                    console.error('Error parsing line stop mesin data:', e);
                }
            });
            
            rows.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            if (rows.length === 0) {
                return '<tr><td colspan="9" style="text-align: center; color: var(--text-secondary); padding: 40px;">No line stop mesin records found for this period</td></tr>';

                        <td class="wrap-text">${row.wr}</td>
                    </tr>
                `;
            }).join('');
        }

        async function searchOEERecordForEdit() {
            if (!isManagementUnlocked) {
                showToast('Anda harus unlock management dulu', 'error');
                return;
            }

            const date = document.getElementById('edit-search-date').value;
            const shift = document.getElementById('edit-search-shift').value;
            
            if (!date || !shift) {
                showToast('Pilih tanggal dan shift dulu', 'error');
                return;
            }
            
            showLoading('Mencari data...');
            
            // Cari record dengan kombinasi tanggal + shift
            const { data: records, error } = await db
                .from('oee_records')
                .select('*')
                .eq('date', date)
                .eq('shift', shift)
                .order('machine_name');
            
            hideLoading();
            
            if (error) {
                showToast('Error: ' + error.message, 'error');
                return;
            }
            
            const resultDiv = document.getElementById('edit-search-result');
            
            if (!records || records.length === 0) {
                resultDiv.innerHTML = `
                    <div style="background: rgba(239, 68, 68, 0.1); padding: 20px; border-radius: 8px; text-align: center; color: var(--danger);">
                        <p style="font-weight: 600;">❌ Tidak ada data untuk tanggal ${new Date(date).toLocaleDateString('id-ID')} shift ${shift}</p>
                        <p style="font-size: 13px; margin-top: 8px;">Mungkin data belum diinput atau sudah dihapus</p>
                    </div>
                `;
                return;
            }
            
            // Tampilkan daftar machine yang ada di shift tersebut
            resultDiv.innerHTML = `
                <div style="margin-top: 24px;">
                    <h4 style="font-weight: 700; margin-bottom: 16px;">📋 Ditemukan ${records.length} data:</h4>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px;">
                        ${records.map(record => `
                            <div style="border: 2px solid var(--border); border-radius: 12px; padding: 16px; background: var(--bg-primary);">
                                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                                    <div>
                                        <strong style="font-size: 16px;">${record.machine_name}</strong>
                                        <div style="font-size: 12px; color: var(--text-secondary);">PIC: ${record.pic}</div>
                                    </div>
                                    <span class="badge ${record.oee_actual >= 88 ? 'badge-success' : 'badge-danger'}">
                                        OEE: ${record.oee_actual.toFixed(1)}%
                                    </span>
                                </div>
                                <div style="font-size: 13px; margin-bottom: 12px;">
                                    <div>Batch: ${record.batch_number} | Output: ${record.actual_output}</div>
                                    <div style="color: var(--text-secondary);">${record.notes || '-'}</div>
                                </div>
                                <button class="btn btn-primary" style="width: 100%;" 
                                        onclick="openEditOEEModal('${record.id}')">
                                    ✏️ Edit Data Ini
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderEditableODTItems(masterODT, existingODT) {
            if (!masterODT || masterODT.length === 0) return '<p class="text-secondary">Tidak ada ODT items</p>';
            
            return masterODT.map(odt => {
                const existing = existingODT.find(e => e.name === odt.odt_name) || {};
                return `
                    <div class="checkbox-item" id="edit-odt-${odt.id}">
                        <input type="checkbox" id="edit-odt-check-${odt.id}" 
                               ${existing.checked ? 'checked' : ''} 
                               onchange="toggleEditODT('${odt.id}')">
                        <label style="flex: 1; cursor: pointer;" for="edit-odt-check-${odt.id}">
                            <strong>${odt.odt_name}</strong> 
                            <span style="color: var(--text-secondary);">(Standard: ${odt.standard_time} min)</span>
                        </label>
                        <input type="number" id="edit-odt-time-${odt.id}" 
                               value="${existing.actualTime || ''}" 
                               min="0" step="0.1" 
                               placeholder="Actual time" 
                               class="odt-actual-time input-field"
                               ${existing.checked ? '' : 'disabled'}
                               oninput="checkEditODTExceed('${odt.id}', ${odt.standard_time})">
                    </div>
                    <div id="edit-odt-exceed-warning-${odt.id}" class="odt-exceed-warning" style="display: none;"></div>
                `;
            }).join('');
        }

        function renderEditableLSMItems(masterLSM, existingLSM) {
            if (!masterLSM || masterLSM.length === 0) return '<p class="text-secondary">Tidak ada Line Stop Mesin items</p>';
            
            return masterLSM.map(ls => {
                const existing = existingLSM.find(e => e.item === ls.item_name) || {};
                return `
                    <div style="background: var(--bg-secondary); padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border);">
                        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
                            <input type="checkbox" id="edit-lsm-check-${ls.id}" 
                                   ${existing.duration ? 'checked' : ''}
                                   onchange="toggleEditLSM('${ls.id}')">
                            <label style="flex: 1; font-weight: 600; cursor: pointer;" for="edit-lsm-check-${ls.id}">${ls.item_name}</label>
                        </div>
                        <div id="edit-lsm-details-${ls.id}" style="display: ${existing.duration ? 'block' : 'none'}; padding-left: 32px;">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                                <input type="number" id="edit-lsm-duration-${ls.id}" 
                                       value="${existing.duration || ''}" 
                                       min="0" step="0.1" placeholder="Duration (min)" class="input-field" 
                                       style="padding: 6px 10px;" oninput="checkEditLSMDuration('${ls.id}')">
                                <input type="text" id="edit-lsm-action-${ls.id}" 
                                       value="${existing.action || ''}" 
                                       placeholder="Action" class="input-field" style="padding: 6px 10px;">
                            </div>
                            <input type="text" id="edit-lsm-wr-${ls.id}" 
                                   value="${existing.wr || ''}" 
                                   placeholder="No WR" class="input-field" style="margin-top: 8px; padding: 6px 10px;">
                            <div id="edit-lsm-warning-${ls.id}" style="display: none; margin-top: 8px; padding: 8px; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); border-radius: 6px; font-size: 12px; color: var(--danger);"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderEditableLSNMItems(masterLSNM, existingLSNM) {
            if (!masterLSNM || masterLSNM.length === 0) return '<p class="text-secondary">Tidak ada Line Stop Non Mesin items</p>';
            
            return masterLSNM.map(ls => {
                const existing = existingLSNM.find(e => e.item === ls.item_name) || {};
                return `
                    <div style="background: var(--bg-secondary); padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border);">
                        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
                            <input type="checkbox" id="edit-lsnm-check-${ls.id}" 
                                   ${existing.duration ? 'checked' : ''}

                        </div>
                        <div id="edit-lsnm-details-${ls.id}" style="display: ${existing.duration ? 'block' : 'none'}; padding-left: 32px;">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                                <input type="number" id="edit-lsnm-duration-${ls.id}" 
                                       value="${existing.duration || ''}" 
                                       min="0" step="0.1" placeholder="Duration (min) *" class="input-field" 
                                       style="padding: 6px 10px;" oninput="updateEditCalculations()">
                                <input type="text" id="edit-lsnm-action-${ls.id}" 
                                       value="${existing.action || ''}" 
                                       placeholder="Action *" class="input-field" style="padding: 6px 10px;">
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderEditableMSItems(masterMS, existingMS) {
            if (!masterMS || masterMS.length === 0) return '<p class="text-secondary">Tidak ada Minor Stop items</p>';
            
            return masterMS.map(ms => {
                const existing = existingMS.find(e => e.item === ms.item_name) || {};
                return `
                    <div style="background: var(--bg-secondary); padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border);">
                        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">

        function updateEditCalculations() {
            if (!editingMachineDetails || !editingRecordData) return;
            
            const shift = document.getElementById('edit-shift')?.value;
            const output = parseFloat(document.getElementById('edit-output')?.value) || 0;
            const reject = parseFloat(document.getElementById('edit-reject')?.value) || 0;
            
            // Collect ODT data
            const odtData = [];
            if (editingMachineDetails.odt) {
                editingMachineDetails.odt.forEach(odt => {
                    const checkbox = document.getElementById(`edit-odt-check-${odt.id}`);
                    if (!checkbox) return;
                    
                    const checked = checkbox.checked;
                    const input = document.getElementById(`edit-odt-time-${odt.id}`);
                    const actualTime = input?.value || 0;
                    odtData.push({
                        name: odt.odt_name,
                        standardTime: odt.standard_time,
                        actualTime: actualTime,
                        checked: checked
                    });
                });
            }
            
            // Collect LSM data
            const lineStopMesinData = [];
            if (editingMachineDetails.lineStopMesin) {
                editingMachineDetails.lineStopMesin.forEach(ls => {
                    const checkbox = document.getElementById(`edit-lsm-check-${ls.id}`);
                    if (!checkbox || !checkbox.checked) return;
                    
                    const duration = document.getElementById(`edit-lsm-duration-${ls.id}`)?.value || 0;
                    const action = document.getElementById(`edit-lsm-action-${ls.id}`)?.value || '';
                    const wr = document.getElementById(`edit-lsm-wr-${ls.id}`)?.value || '';
                    lineStopMesinData.push({
                        item: ls.item_name,
                        duration: duration,
                        action: action,
                        wr: wr
                    });
                });
            }
            
            // Custom LSM
            for (let i = 1; i <= customLSMCounter; i++) {
                const itemEl = document.getElementById(`edit-custom-lsm-item-${i}`);
                if (itemEl && itemEl.value) {
                    const duration = document.getElementById(`edit-custom-lsm-duration-${i}`)?.value || 0;
                    const action = document.getElementById(`edit-custom-lsm-action-${i}`)?.value || '';
                    const wr = document.getElementById(`edit-custom-lsm-wr-${i}`)?.value || '';
                    lineStopMesinData.push({
                        item: itemEl.value,
                        duration: duration,
                        action: action,
                        wr: wr
                    });
                }
            }
            
            // Collect LSNM data
            const lineStopNonMesinData = [];
            if (editingMachineDetails.lineStopNonMesin) {
                editingMachineDetails.lineStopNonMesin.forEach(ls => {
                    const checkbox = document.getElementById(`edit-lsnm-check-${ls.id}`);
                    if (!checkbox || !checkbox.checked) return;
                    
                    const duration = document.getElementById(`edit-lsnm-duration-${ls.id}`)?.value || 0;
                    const action = document.getElementById(`edit-lsnm-action-${ls.id}`)?.value || '';
                    lineStopNonMesinData.push({
                        item: ls.item_name,
                        duration: duration,
                        action: action
                    });
                });
            }
            
            // Custom LSNM
            for (let i = 1; i <= customLSNMCounter; i++) {
                const itemEl = document.getElementById(`edit-custom-lsnm-item-${i}`);
                if (itemEl && itemEl.value) {
                    const duration = document.getElementById(`edit-custom-lsnm-duration-${i}`)?.value || 0;
                    const action = document.getElementById(`edit-custom-lsnm-action-${i}`)?.value || '';
                    lineStopNonMesinData.push({
                        item: itemEl.value,
                        duration: duration,
                        action: action
                    });
                }
            }
            
            const machine = allMachines.find(m => m.id === editingRecordData.machine_id);
            
            const formData = {

                targetPerMinute: machine?.target_per_minute || 0,

            document.getElementById('edit-calc-p').textContent = results.performance.toFixed(1) + '%';

            document.getElementById('edit-calc-q').style.color = results.quality >= 99 ? 'var(--success)' : 'var(--danger)';

                    editingMachineDetails.lineStopMesin.forEach(ls => {

                        const duration = parseFloat(document.getElementById(`edit-lsm-duration-${ls.id}`)?.value) || 0;

                        const wr = document.getElementById(`edit-lsm-wr-${ls.id}`)?.value || '';
                        
                        if (duration >= 180 && (!action || !wr)) {
                            throw new Error(`Line Stop Mesin "${ls.item_name}": Action dan WR wajib diisi untuk durasi ≥ 180 menit`);

                        lineStopMesinData.push({
                            item: ls.item_name,
                            duration: duration,
                            action: action,
                            wr: wr
                        });
                    });
                }
                
                // Custom LSM
                for (let i = 1; i <= customLSMCounter; i++) {
                    const itemEl = document.getElementById(`edit-custom-lsm-item-${i}`);
                    if (itemEl && itemEl.value) {
                        const item = itemEl.value;
                        const duration = parseFloat(document.getElementById(`edit-custom-lsm-duration-${i}`)?.value) || 0;
                        const action = document.getElementById(`edit-custom-lsm-action-${i}`)?.value || '';
                        const wr = document.getElementById(`edit-custom-lsm-wr-${i}`)?.value || '';
                        
                        if (!duration) {
                            throw new Error(`Custom Line Stop Mesin "${item}": Duration wajib diisi`);
                        }
                        
                        if (duration >= 180 && (!action || !wr)) {
                            throw new Error(`Custom Line Stop Mesin "${item}": Action dan WR wajib diisi untuk durasi ≥ 180 menit`);
                        }
                        
                        lineStopMesinData.push({ item, duration, action, wr });
                    }
                }
                
                // Collect LSNM data
                const lineStopNonMesinData = [];
                if (editingMachineDetails.lineStopNonMesin) {
                    editingMachineDetails.lineStopNonMesin.forEach(ls => {
                        const checkbox = document.getElementById(`edit-lsnm-check-${ls.id}`);
                        if (!checkbox || !checkbox.checked) return;
                        
                        const duration = parseFloat(document.getElementById(`edit-lsnm-duration-${ls.id}`)?.value) || 0;
                        const action = document.getElementById(`edit-lsnm-action-${ls.id}`)?.value || '';
                        
                        if (!action) {
                            throw new Error(`Line Stop Non Mesin "${ls.item_name}": Action wajib diisi`);
                        }
                        
                        lineStopNonMesinData.push({
                            item: ls.item_name,
                            duration: duration,
                            action: action
                        });
                    });
                }
                
                // Custom LSNM
                for (let i = 1; i <= customLSNMCounter; i++) {
                    const itemEl = document.getElementById(`edit-custom-lsnm-item-${i}`);
                    if (itemEl && itemEl.value) {
                        const item = itemEl.value;

                        if (!duration || !action) {
                            throw new Error(`Custom Line Stop Non Mesin "${item}": Duration dan Action wajib diisi`);
                        }
                        
                        lineStopNonMesinData.push({ item, duration, action });
                    }
                }
                
                // Collect MS data

                if (editingMachineDetails.minorStop) {

                const results = calculateOEE(formData);
                
                // Siapkan data untuk update

                    pic: pic,
                    product_code: product,
                    batch_number: batch,
                    actual_output: output,
                    reject: reject,
                    odt_data: odtData,
                    line_stop_mesin_data: lineStopMesinData,
                    line_stop_non_mesin_data: [...lineStopNonMesinData, ...results.odtExceeds],
                    minor_stop_data: minorStopData,
                    minor_stop_count: totalMinorStopCount,
                    availability_actual: results.availabilityActual,
                    availability_365: results.availability365,
                    performance: results.performance,
                    quality: results.quality,
                    oee_actual: results.oeeActual,
                    oee_365: results.oee365,
                    notes: document.getElementById('edit-notes')?.value || ''
                };
                
                // Update ke database
                await updateOEERecord(editingRecordId, updatedRecord);
                
                // Refresh data
                await loadOEERecords();
                
                hideLoading();
                showToast('✅ Data berhasil diupdate!', 'success');
                closeModal();
                
                // Refresh tampilan
                renderApp();

                showToast(error.message || 'Gagal mengupdate data', 'error');
            }

        function getFilteredRecords() {
            let records = allOEERecords.filter(r => {
                if (!r.date) return false;
                
                const rDate = new Date(r.date);
                const sDate = new Date(filters.startDate);
                const eDate = new Date(filters.endDate);
                
                const dateMatch = rDate >= sDate && rDate <= eDate;
                const shiftMatch = filters.shift === 'all' || r.shift === filters.shift;
                const machineMatch = filters.machine === 'all' || r.machine_name === filters.machine;
                const picMatch = filters.pic === 'all' || r.pic === filters.pic;
                
                return dateMatch && shiftMatch && machineMatch && picMatch;
            });

            if (filters.detailLineStopItem !== 'all') {
                records = records.filter(r => {
                    let match = false;
                    
                    if (filters.detailLineStopType === 'mesin' && r.line_stop_mesin_data) {
                        try {
                            const lsData = typeof r.line_stop_mesin_data === 'string' ? JSON.parse(r.line_stop_mesin_data) : r.line_stop_mesin_data;
                            match = lsData.some(ls => ls.item === filters.detailLineStopItem);
                        } catch (e) {}
                    }
                    
                    if (filters.detailLineStopType === 'non_mesin' && r.line_stop_non_mesin_data) {
                        try {
                            const lsData = typeof r.line_stop_non_mesin_data === 'string' ? JSON.parse(r.line_stop_non_mesin_data) : r.line_stop_non_mesin_data;
                            match = lsData.some(ls => ls.item === filters.detailLineStopItem);
                        } catch (e) {}
                    }
                    
                    return match;
                });
            }
            
            return records;
        }

                return;
            }
            
            const filtered = allOEERecords.filter(r => {
                if (!r.date) return false;
                const rDate = new Date(r.date);
                const sDate = new Date(startDate);
                const eDate = new Date(endDate);
                return rDate >= sDate && rDate <= eDate;
            });
            
            if (filtered.length === 0) {
                showToast('No data found in selected date range', 'error');
                return;
            }
            
            if (format === 'pdf') {
                exportToPDF(filtered, startDate, endDate);
            } else {
                exportToExcel(filtered, startDate, endDate);
            }
        }

        function exportToExcel(records, startDate, endDate) {
            try {
                const delimiter = '\t';
                
                const headers = [
                    'Date', 'Shift', 'Machine', 'PIC', 'Product Code', 'Batch Number',
                    'Actual Output', 'Reject', 'Minor Stop Count',
                    'Availability %', 'Performance %', 'Quality %', 'Availability 365 %',
                    'OEE Actual %', 'OEE 365 %',
                    'Total ODT (min)', 'Total Line Stop Mesin (min)', 'Total Line Stop Non Mesin (min)',
                    'Notes'
                ];
                
                const rows = records.map(r => {
                    let totalODT = 0;
                    try {
                        const odtData = typeof r.odt_data === 'string' ? JSON.parse(r.odt_data) : (r.odt_data || []);
                        odtData.forEach(odt => {
                            if (odt.checked) {
                                const actualTime = parseFloat(odt.actualTime || 0);
                                const standardTime = parseFloat(odt.standardTime || 0);
                                totalODT += Math.min(actualTime, standardTime);
                            }
                        });
                    } catch (e) {
                        console.error('Error calculating ODT:', e);
                    }
                    
                    let totalLSM = 0;
                    try {
                        const lsmData = typeof r.line_stop_mesin_data === 'string' ? JSON.parse(r.line_stop_mesin_data) : (r.line_stop_mesin_data || []);
                        totalLSM = lsmData.reduce((sum, l) => sum + parseFloat(l.duration || 0), 0);
                    } catch (e) {
                        console.error('Error calculating LSM:', e);
                    }
                    
                    let totalLSNM = 0;
                    try {
                        const lsnmData = typeof r.line_stop_non_mesin_data === 'string' ? JSON.parse(r.line_stop_non_mesin_data) : (r.line_stop_non_mesin_data || []);
                        totalLSNM = lsnmData.reduce((sum, l) => sum + parseFloat(l.duration || 0), 0);
                    } catch (e) {
                        console.error('Error calculating LSNM:', e);
                    }
                    
                    return [
                        r.date ? new Date(r.date).toLocaleDateString('id-ID') : '',
                        r.shift || '',
                        r.machine_name || '',
                        r.pic || '',
                        r.product_code || '',
                        r.batch_number || '',
                        r.actual_output || 0,
                        r.reject || 0,
                        r.minor_stop_count || 0,
                        (r.availability_actual || 0).toFixed(2),
                        (r.performance || 0).toFixed(2),
                        (r.quality || 0).toFixed(2),
                        (r.availability_365 || 0).toFixed(2),
                        (r.oee_actual || 0).toFixed(2),
                        (r.oee_365 || 0).toFixed(2),
                        totalODT.toFixed(2),
                        totalLSM.toFixed(2),
                        totalLSNM.toFixed(2),
                        `"${(r.notes || '').replace(/"/g, '""')}"`
                    ];
                });
                
                const csvContent = [
                    headers.join(delimiter),
                    ...rows.map(row => row.join(delimiter))
                ].join('\n');
                
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                
                link.setAttribute('href', url);
                link.setAttribute('download', `OEE_Export_${startDate}_to_${endDate}.xlsx`);
                link.style.visibility = 'hidden';
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                showToast(`✅ Exported ${records.length} records to Excel`, 'success');
            } catch (e) {
                console.error('Error exporting to Excel:', e);
                showToast('Failed to export data', 'error');
            }
        }

        function exportToPDF(records, startDate, endDate) {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a4');
                
                const config = defaultConfig;
                
                doc.setFontSize(18);
                doc.setFont(undefined, 'bold');
                doc.text(config.system_title, 14, 15);
                
                doc.setFontSize(12);
                doc.setFont(undefined, 'normal');
                doc.text(config.company_name, 14, 22);
                
                doc.setFontSize(10);
                doc.text(`Export Period: ${new Date(startDate).toLocaleDateString('id-ID')} - ${new Date(endDate).toLocaleDateString('id-ID')}`, 14, 28);
                doc.text(`Generated: ${new Date().toLocaleDateString('id-ID')} ${new Date().toLocaleTimeString('id-ID')}`, 14, 33);
                
                const avgOEEActual = records.length > 0 ? records.reduce((sum, r) => sum + (r.oee_actual || 0), 0) / records.length : 0;
                const avgOEE365 = records.length > 0 ? records.reduce((sum, r) => sum + (r.oee_365 || 0), 0) / records.length : 0;
                const totalOutput = records.reduce((sum, r) => sum + (r.actual_output || 0), 0);
                
                doc.setFontSize(9);
                doc.text(`Total Records: ${records.length} | Avg OEE Actual: ${avgOEEActual.toFixed(1)}% | Avg OEE 365: ${avgOEE365.toFixed(1)}% | Total Output: ${totalOutput.toLocaleString('id-ID')}`, 14, 38);
                
                const tableData = records.map(r => {
                    return [
                        r.date ? new Date(r.date).toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit' }) : '',
                        r.shift || '',
                        r.machine_name || '',
                        r.pic || '',
                        r.product_code || '',
                        r.batch_number || '',
                        (r.actual_output || 0).toLocaleString('id-ID'),
                        r.reject || 0,
                        (r.availability_actual || 0).toFixed(1) + '%',
                        (r.performance || 0).toFixed(1) + '%',
                        (r.quality || 0).toFixed(1) + '%',
                        (r.oee_actual || 0).toFixed(1) + '%',
                        (r.oee_365 || 0).toFixed(1) + '%'
                    ];
                });
                
                doc.autoTable({
                    startY: 42,
                    head: [['Date', 'Shift', 'Machine', 'PIC', 'Product', 'Batch', 'Output', 'Reject', 'A%', 'P%', 'Q%', 'OEE Act', 'OEE 365']],
                    body: tableData,
                    styles: { fontSize: 7, cellPadding: 2 },
                    headStyles: { fillColor: [102, 125, 234], fontStyle: 'bold' },
                    alternateRowStyles: { fillColor: [245, 247, 250] },
                    margin: { left: 14, right: 14 },
                    didDrawPage: function (data) {
                        doc.setFontSize(8);
                        doc.text(
                            `Page ${data.pageNumber} of ${doc.internal.getNumberOfPages()}`,
                            doc.internal.pageSize.width / 2,
                            doc.internal.pageSize.height - 10,
                            { align: 'center' }
                        );
                    }
                });
                
                doc.save(`OEE_Export_${startDate}_to_${endDate}.pdf`);
                showToast(`✅ Exported ${records.length} records to PDF`, 'success');
            } catch (e) {
                console.error('Error exporting to PDF:', e);
                showToast('Failed to export data', 'error');
            }
        }

        // Initialize app
        async function initializeApp() {
            try {
                initializeTheme();
                
                showLoading('Connecting to database...');
                
                await Promise.all([
                    loadMachines(),
                    loadOEERecords()
                ]);
                
                hideLoading();
                renderApp();
                
                setInterval(async () => {
                    await loadOEERecords();
                    if (currentPage === 'dashboard') {
                        renderCharts();
                    }
                }, 30000);
                
            } catch (error) {
                console.error('Initialization error:', error);
                hideLoading();
                showToast('Failed to initialize application', 'error');
                
                const app = document.getElementById('app-wrapper');
                app.innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; text-align: center; padding: 20px;">
                        <h1 style="color: var(--danger); font-size: 24px; word-break: break-word;">⚠️ Connection Error</h1>
                        <p style="color: var(--text-secondary); word-break: break-word;">Failed to connect to database</p>
                        <button class="btn btn-primary" onclick="location.reload()">Retry</button>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
